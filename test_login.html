<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a2e; color: white; }
        .container { max-width: 600px; margin: 0 auto; }
        input, button { display: block; width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #gold; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; background: #16213e; border-radius: 5px; }
        .success { color: #4CAF50; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Login Test Tool</h1>
        <input type="text" id="username" placeholder="Username" value="Skan">
        <input type="password" id="password" placeholder="Password">
        <button onclick="testLogin()">Test Login</button>
        <button onclick="checkCookies()">Check Cookies</button>
        <button onclick="testDashboard()">Test Dashboard API</button>
        <div id="result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api/v1';
        
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const result = document.getElementById('result');
            
            result.innerHTML = '⏳ Testing login...';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store tokens in cookies
                    document.cookie = `access_token=${data.access_token};path=/;max-age=1800;SameSite=Lax`;
                    document.cookie = `refresh_token=${data.refresh_token};path=/;max-age=604800;SameSite=Lax`;
                    
                    result.innerHTML = `
                        <div class="success">
                            <h3>✅ Login Successful!</h3>
                            <p><strong>User:</strong> ${data.user.username}</p>
                            <p><strong>Email:</strong> ${data.user.email}</p>
                            <p><strong>Access Token:</strong> ${data.access_token.substring(0, 50)}...</p>
                            <p><strong>Cookies set!</strong> You can now try accessing the dashboard.</p>
                            <button onclick="window.location.href='http://localhost:3001/dashboard'">Go to Dashboard</button>
                        </div>
                    `;
                } else {
                    result.innerHTML = `<div class="error"><h3>❌ Login Failed</h3><p>${data.detail}</p></div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="error"><h3>❌ Error</h3><p>${error.message}</p></div>`;
            }
        }
        
        function checkCookies() {
            const result = document.getElementById('result');
            const cookies = document.cookie.split('; ');
            const accessToken = cookies.find(c => c.startsWith('access_token='));
            const refreshToken = cookies.find(c => c.startsWith('refresh_token='));
            
            result.innerHTML = `
                <h3>🍪 Current Cookies:</h3>
                <p><strong>Access Token:</strong> ${accessToken || 'Not found'}</p>
                <p><strong>Refresh Token:</strong> ${refreshToken || 'Not found'}</p>
                <p><strong>All cookies:</strong></p>
                <pre>${document.cookie || 'No cookies'}</pre>
            `;
        }
        
        async function testDashboard() {
            const result = document.getElementById('result');
            const cookies = document.cookie.split('; ');
            const accessToken = cookies.find(c => c.startsWith('access_token='))?.split('=')[1];
            
            if (!accessToken) {
                result.innerHTML = '<div class="error">❌ No access token found. Please login first.</div>';
                return;
            }
            
            result.innerHTML = '⏳ Testing dashboard API...';
            
            try {
                const response = await fetch(`${API_URL}/users/me`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `
                        <div class="success">
                            <h3>✅ Dashboard API Works!</h3>
                            <p><strong>User:</strong> ${data.username}</p>
                            <p><strong>Email:</strong> ${data.email}</p>
                            <p><strong>Active:</strong> ${data.is_active}</p>
                            <p>You should be able to access the dashboard now!</p>
                            <button onclick="window.location.href='http://localhost:3001/dashboard'">Go to Dashboard</button>
                        </div>
                    `;
                } else {
                    result.innerHTML = `<div class="error"><h3>❌ API Failed</h3><p>${JSON.stringify(data)}</p></div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="error"><h3>❌ Error</h3><p>${error.message}</p></div>`;
            }
        }
    </script>
</body>
</html>
